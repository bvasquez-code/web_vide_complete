<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <a routerLink="/" class="h4 mb-0 text-dark">Videos</a>
    <app-publictoolbar></app-publictoolbar>
  </div>
</header>

<main class="container py-4">
  <app-backbutton></app-backbutton>
  <div class="d-flex flex-wrap justify-content-between align-items-start mb-3">
    <div>
      <h1 class="h3 mb-1">{{ category.Name }}</h1>
      <p class="text-muted mb-0">{{ category.Description }}</p>
    </div>
    <div class="btn-group btn-group-sm mt-2">
      <button class="btn" [class.btn-primary]="sortMode === 'recent'" [class.btn-outline-primary]="sortMode !== 'recent'" (click)="loadVideos('recent', 1)">Recientes</button>
      <button class="btn" [class.btn-primary]="sortMode === 'views'" [class.btn-outline-primary]="sortMode !== 'views'" (click)="loadVideos('views', 1)">Mas vistos</button>
    </div>
  </div>
  <small class="text-muted d-block mb-3">{{ totalRows }} videos disponibles</small>
  <div class="row">
    <div class="col-sm-6 col-lg-4 mb-4" *ngFor="let video of videos">
      <app-videocard [video]="video"></app-videocard>
    </div>
  </div>
  <div class="pagination-toolbar form-section p-3 mt-2" *ngIf="totalRows > limit">
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-primary" [disabled]="!canPreviousPage()" (click)="goToFirstPage()">Pagina inicio</button>
      <button class="btn btn-outline-primary" [disabled]="!canPreviousPage()" (click)="loadVideos(sortMode, page - 1)"><i class="fas fa-chevron-left mr-1"></i> Anterior</button>
    </div>
    <div class="pagination-jump">
      <span class="text-muted">Pagina</span>
      <input type="number" class="form-control form-control-sm pagination-input" min="1" [max]="totalPages()" [(ngModel)]="pageInput" name="publicCategoryPageInput" (keyup.enter)="goToPageInput()">
      <button type="button" class="btn btn-outline-primary btn-sm" (click)="goToPageInput()">Ir</button>
      <span class="text-muted">de {{ totalPages() }}</span>
    </div>
    <div class="btn-group btn-group-sm">
      <button class="btn btn-outline-primary" [disabled]="!canNextPage()" (click)="loadVideos(sortMode, page + 1)">Siguiente <i class="fas fa-chevron-right ml-1"></i></button>
      <button class="btn btn-outline-primary" [disabled]="!canNextPage()" (click)="goToLastPage()">Pagina fin</button>
    </div>
  </div>
</main>
