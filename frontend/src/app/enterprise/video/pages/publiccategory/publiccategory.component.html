<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <a routerLink="/" class="h4 mb-0 text-dark">Videos</a>
    <a routerLink="/admin/login" class="btn btn-outline-primary btn-sm"><i class="fas fa-user-shield mr-1"></i> Admin</a>
  </div>
</header>

<main class="container py-4">
  <a routerLink="/" class="btn btn-link px-0 mb-2"><i class="fas fa-arrow-left mr-1"></i> Volver</a>
  <div class="d-flex flex-wrap justify-content-between align-items-start mb-3">
    <div>
      <h1 class="h3 mb-1">{{ category.Name }}</h1>
      <p class="text-muted mb-0">{{ category.Description }}</p>
    </div>
    <div class="btn-group btn-group-sm mt-2">
      <button class="btn" [class.btn-primary]="sortMode === 'recent'" [class.btn-outline-primary]="sortMode !== 'recent'" (click)="loadVideos('recent')">Recientes</button>
      <button class="btn" [class.btn-primary]="sortMode === 'views'" [class.btn-outline-primary]="sortMode !== 'views'" (click)="loadVideos('views')">Mas vistos</button>
    </div>
  </div>
  <div class="row">
    <div class="col-sm-6 col-lg-4 mb-4" *ngFor="let video of videos">
      <article class="video-card">
        <img class="video-thumb" [src]="thumb(video)" [alt]="video.Title">
        <div class="p-3">
          <h2 class="h5">{{ video.Title }}</h2>
          <p class="text-muted small">{{ video.ShortDescription }}</p>
          <div class="d-flex justify-content-between align-items-center">
            <small>{{ video.ViewCount || 0 }} vistas</small>
            <a [routerLink]="['/video', video.VideoCod]" class="btn btn-primary btn-sm">Ver video</a>
          </div>
        </div>
      </article>
    </div>
  </div>
</main>
