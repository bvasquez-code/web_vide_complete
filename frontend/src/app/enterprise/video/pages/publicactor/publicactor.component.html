<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <a routerLink="/" class="h4 mb-0 text-dark">Videos</a>
    <app-publictoolbar></app-publictoolbar>
  </div>
</header>

<main class="container py-4">
  <app-backbutton></app-backbutton>
  <section class="form-section actor-profile p-3 mb-3">
    <img class="actor-profile-image" [src]="actorImage() | mediaUrl" [alt]="actor.Name || 'Actor'" (error)="onActorImageError($event)">
    <div class="actor-profile-content">
      <h1 class="h3 mb-1">{{ publicPreferenceService.showThumbnails() ? (actor.Name || 'Actor') : actor.ActorCod }}</h1>
      <p class="text-muted mb-0" *ngIf="publicPreferenceService.showThumbnails()">{{ actorDescription() }}</p>
    </div>
    <div class="actor-profile-actions mt-2">
      <a class="btn btn-outline-success btn-sm" [routerLink]="['/actor', actorCod, 'fotos']">
        <i class="fas fa-images mr-1"></i> Ver fotos del actor
      </a>
      <div class="btn-group btn-group-sm">
        <button class="btn" [class.btn-primary]="sortMode === 'recent'" [class.btn-outline-primary]="sortMode !== 'recent'" (click)="loadVideos('recent', 1)">Recientes</button>
        <button class="btn" [class.btn-primary]="sortMode === 'views'" [class.btn-outline-primary]="sortMode !== 'views'" (click)="loadVideos('views', 1)">Mas vistos</button>
      </div>
    </div>
  </section>

  <small class="text-muted d-block mb-3">{{ totalRows }} videos disponibles</small>
  <div class="row">
    <div class="col-sm-6 col-lg-4 mb-4" *ngFor="let video of videos">
      <app-videocard [video]="video"></app-videocard>
    </div>
  </div>
  <app-pagination [pagination]="pagination" (pageChange)="loadVideos(sortMode, $event)"></app-pagination>
</main>
