<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <app-backbutton fallbackUrl="/admin" cssClass="btn btn-outline-secondary btn-sm mr-2"></app-backbutton>
      <a routerLink="/admin" class="h4 mb-0 text-dark">Videos</a>
    </div>
    <a routerLink="/admin/videos/create" class="btn btn-primary btn-sm"><i class="fas fa-plus mr-1"></i> Nuevo</a>
  </div>
</header>
<main class="container py-4">
  <div class="form-section p-3 mb-3">
    <div class="form-row">
      <div class="col-md-5 mb-2"><input class="form-control" placeholder="Buscar titulo" [(ngModel)]="Query" name="Query"></div>
      <div class="col-md-3 mb-2">
        <select class="form-control" [(ngModel)]="Status" name="Status">
          <option value="">Todos los estados</option>
          <option value="A">Activo</option>
          <option value="I">Inactivo</option>
        </select>
      </div>
      <div class="col-md-3 mb-2">
        <select class="form-control" [(ngModel)]="SourceType" name="SourceType">
          <option value="">Todos los origenes</option>
          <option value="EMBED">EMBED</option>
          <option value="URL">URL</option>
          <option value="PATH">PATH</option>
        </select>
      </div>
      <div class="col-md-1 mb-2"><button class="btn btn-outline-primary btn-block" (click)="search()"><i class="fas fa-search"></i></button></div>
    </div>
  </div>
  <div class="table-responsive form-section">
    <table class="table table-hover mb-0">
      <thead><tr><th>Titulo</th><th>Origen</th><th>Vistas</th><th>Estado</th><th></th></tr></thead>
      <tbody>
        <tr *ngFor="let video of videos">
          <td>{{ video.Title }}</td>
          <td>{{ video.SourceType }}</td>
          <td>{{ video.ViewCount }}</td>
          <td>{{ video.Status }}</td>
          <td class="text-right">
            <button type="button" class="btn btn-sm btn-outline-secondary mr-1" (click)="openPreview(video)" title="Previsualizar"><i class="fas fa-play"></i></button>
            <a [routerLink]="['/admin/videos/edit', video.VideoCod]" class="btn btn-sm btn-outline-primary mr-1"><i class="fas fa-edit"></i></a>
            <button class="btn btn-sm btn-outline-success mr-1" (click)="enable(video)" *ngIf="video.Status !== 'A'"><i class="fas fa-check"></i></button>
            <button class="btn btn-sm btn-outline-warning" (click)="disable(video)" *ngIf="video.Status === 'A'"><i class="fas fa-ban"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="d-flex justify-content-between align-items-center form-section p-3 mt-2" *ngIf="TotalRows > Limit">
    <button class="btn btn-outline-primary btn-sm" [disabled]="!canPreviousPage()" (click)="findAll(Page - 1)"><i class="fas fa-chevron-left mr-1"></i> Anterior</button>
    <span class="text-muted">Pagina {{ Page }} de {{ totalPages() }} - {{ TotalRows }} videos</span>
    <button class="btn btn-outline-primary btn-sm" [disabled]="!canNextPage()" (click)="findAll(Page + 1)">Siguiente <i class="fas fa-chevron-right ml-1"></i></button>
  </div>

  <aside class="admin-video-preview shadow" [style.width.px]="previewWidth" *ngIf="previewVideo">
    <div class="admin-video-preview-resize" (mousedown)="startPreviewResize($event)" title="Cambiar tamano"></div>
    <div class="admin-video-preview-header">
      <div class="admin-video-preview-title">{{ previewVideo.Title }}</div>
      <button type="button" class="btn btn-sm btn-link text-white p-0" (click)="closePreview()" title="Cerrar"><i class="fas fa-times"></i></button>
    </div>
    <div class="admin-video-preview-body">
      <div class="embed-responsive embed-responsive-16by9" *ngIf="previewEmbedHtml" [innerHTML]="previewEmbedHtml"></div>
      <video class="admin-video-preview-player" controls preload="metadata" [src]="previewSource" (error)="onPreviewError($event)" *ngIf="previewSource"></video>
      <div class="alert alert-warning m-2 py-2" *ngIf="previewError">{{ previewError }}</div>
    </div>
  </aside>
</main>
