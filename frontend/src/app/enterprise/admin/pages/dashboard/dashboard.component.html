<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <a routerLink="/admin" class="h4 mb-0 text-dark">Panel de administracion</a>
    <button class="btn btn-outline-secondary btn-sm" (click)="logout()">Cerrar sesion</button>
  </div>
</header>
<main class="container py-4">
  <div class="row">
    <div class="col-md-3 mb-3"><a routerLink="/admin/videos" class="form-section p-3 d-block text-dark">Gestion de videos</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/categories" class="form-section p-3 d-block text-dark">Categorias</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/actors" class="form-section p-3 d-block text-dark">Actores</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/tags" class="form-section p-3 d-block text-dark">Tags</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/capture-suggestions" class="form-section p-3 d-block text-dark">Sugerencias de capturas</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/statistics/videos" class="form-section p-3 d-block text-dark">Estadisticas por videos</a></div>
    <div class="col-md-3 mb-3"><a routerLink="/admin/statistics/actors" class="form-section p-3 d-block text-dark">Estadisticas por actores</a></div>
  </div>
</main>
