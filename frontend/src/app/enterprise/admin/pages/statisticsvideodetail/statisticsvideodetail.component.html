<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <app-backbutton fallbackUrl="/admin/statistics/videos" cssClass="btn btn-outline-secondary btn-sm mr-2"></app-backbutton>
      <a routerLink="/admin/statistics/videos" class="h4 mb-0 text-dark">Detalle de estadisticas</a>
    </div>
    <a [routerLink]="['/admin/videos/edit', videoCod]" class="btn btn-outline-primary btn-sm" *ngIf="videoCod"><i class="fas fa-edit mr-1"></i> Editar video</a>
  </div>
</header>
<main class="container py-4">
  <app-videostatisticsdetail [videoCod]="videoCod"></app-videostatisticsdetail>
</main>
