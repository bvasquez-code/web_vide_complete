<header class="app-header">
  <div class="container py-3 d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <app-backbutton fallbackUrl="/admin" cssClass="btn btn-outline-secondary btn-sm mr-2"></app-backbutton>
      <a routerLink="/admin" class="h4 mb-0 text-dark">{{ title() }}</a>
    </div>
    <button class="btn btn-outline-secondary btn-sm" (click)="newEntity()">Nuevo</button>
  </div>
</header>
<main class="container py-4">
  <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="row">
    <div class="col-lg-4 mb-3">
      <div class="form-section p-3">
        <h2 class="h5">Registro</h2>
        <div class="form-group"><label>Nombre</label><input class="form-control" [(ngModel)]="entity.Name" name="Name"></div>
        <div class="form-group" *ngIf="type !== 'tags'"><label>Descripcion</label><textarea class="form-control" [(ngModel)]="entity.Description" name="Description"></textarea></div>
        <div class="form-group" *ngIf="type !== 'tags'">
          <label>Imagen</label>
          <input class="form-control" [(ngModel)]="entity.ImageUrl" name="ImageUrl">
          <div class="admin-image-preview mt-2" *ngIf="entity.ImageUrl">
            <img [src]="entity.ImageUrl" alt="Previsualizacion de imagen">
          </div>
        </div>
        <div class="form-group" *ngIf="type === 'categories'"><label>Orden</label><input type="number" class="form-control" [(ngModel)]="entity.DisplayOrder" name="DisplayOrder"></div>
        <div class="form-group"><label>Estado</label><select class="form-control" [(ngModel)]="entity.Status" name="Status"><option value="A">Activo</option><option value="I">Inactivo</option></select></div>
        <button class="btn btn-primary" (click)="save()">Guardar</button>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="form-section p-3 mb-3">
        <div class="form-row">
          <div class="col-md-7 mb-2"><input class="form-control" placeholder="Buscar nombre" [(ngModel)]="Query" name="Query"></div>
          <div class="col-md-3 mb-2"><select class="form-control" [(ngModel)]="Status" name="Status"><option value="">Todos</option><option value="A">Activo</option><option value="I">Inactivo</option></select></div>
          <div class="col-md-2 mb-2"><button class="btn btn-outline-primary btn-block" (click)="search()"><i class="fas fa-search"></i></button></div>
        </div>
      </div>
      <div class="table-responsive form-section">
        <table class="table table-hover mb-0">
          <thead><tr><th>Nombre</th><th>Estado</th><th></th></tr></thead>
          <tbody>
            <tr *ngFor="let row of rows">
              <td>{{ row.Name }}</td>
              <td>{{ row.Status }}</td>
              <td class="text-right">
                <button class="btn btn-sm btn-outline-primary mr-1" (click)="edit(row)"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-success mr-1" (click)="enable(row)" *ngIf="row.Status !== 'A'"><i class="fas fa-check"></i></button>
                <button class="btn btn-sm btn-outline-warning" (click)="disable(row)" *ngIf="row.Status === 'A'"><i class="fas fa-ban"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-toolbar form-section p-3 mt-2" *ngIf="TotalRows > Limit">
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-primary" [disabled]="!canPreviousPage()" (click)="goToFirstPage()">Pagina inicio</button>
          <button class="btn btn-outline-primary" [disabled]="!canPreviousPage()" (click)="findAll(Page - 1)"><i class="fas fa-chevron-left mr-1"></i> Anterior</button>
        </div>
        <div class="pagination-jump">
          <span class="text-muted">Pagina</span>
          <input type="number" class="form-control form-control-sm pagination-input" min="1" [max]="totalPages()" [(ngModel)]="pageInput" name="catalogPageInput" (keyup.enter)="goToPageInput()">
          <button type="button" class="btn btn-outline-primary btn-sm" (click)="goToPageInput()">Ir</button>
          <span class="text-muted">de {{ totalPages() }} - {{ TotalRows }} registros</span>
        </div>
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-primary" [disabled]="!canNextPage()" (click)="findAll(Page + 1)">Siguiente <i class="fas fa-chevron-right ml-1"></i></button>
          <button class="btn btn-outline-primary" [disabled]="!canNextPage()" (click)="goToLastPage()">Pagina fin</button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="modal d-block" tabindex="-1" role="dialog" *ngIf="saveMessage" style="background: rgba(0,0,0,.35);">
  <div class="modal-dialog modal-sm" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ saveMessageType === 'success' ? 'Guardado correcto' : 'No se pudo guardar' }}</h5>
        <button type="button" class="close" (click)="closeSaveMessage()"><span>&times;</span></button>
      </div>
      <div class="modal-body">
        <div class="alert mb-0" [class.alert-success]="saveMessageType === 'success'" [class.alert-danger]="saveMessageType === 'error'">{{ saveMessage }}</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary btn-sm" (click)="closeSaveMessage()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
